trainer:
  max_epochs: 200
  limit_val_batches: 0
  check_val_every_n_epoch: 1000000
  precision: 16-mixed

  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      every_n_epochs: 1
      save_top_k: 20
      monitor: "epoch"
      mode: "max"
      save_last: true
      save_weights_only: true
      save_on_train_epoch_end: true

  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      resume: allow
      project: "eomt"
      name: "synapse_semantic_vit_deconv_baseline_384" 

model:
  class_path: training.pixel_classification_semantic.PixelClassificationSemantic
  init_args:
    num_classes: 9
    img_size: [384, 384]
    ignore_idx: 255
    
    network:
      class_path: models.eoseg.EoSegDeconvSeg
      init_args:
        num_classes: 9 
        
        encoder:
          class_path: models.vit.ViT


data:
  class_path: datasets.synapse_semantic.SynapseSemantic
  init_args:
    train_base_dir: "/scratch/xinli38/data/Synapse/train_npz"
    test_base_dir: "/scratch/xinli38/data/Synapse/test_vol_h5"
    list_dir: "/scratch/xinli38/data/Synapse/lists/lists_Synapse"
    img_size: [384, 384]
    num_classes: 9
    batch_size: 16
    num_workers: 8
    ignore_idx: 255
    drop_background: False
    make_rgb: True
